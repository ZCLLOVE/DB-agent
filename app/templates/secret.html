{% extends "base.html" %}

{% block title %}Secret 记事本{% endblock %}

{% block body %}
<!-- 顶部栏 -->
<header class="bg-bg-light border-b border-border flex items-center h-10 px-3 shrink-0">
    <div class="flex items-center gap-3">
        <span class="text-sm font-medium text-gray-300">TXT 记事本</span>
    </div>
    <div class="flex items-center gap-2">
        <a href="/" target="_blank" class="text-muted hover:text-gray-300 text-sm px-3 py-1 rounded hover:bg-bg-lighter border border-border" title="数据库管理">DB</a>
        <a href="/api" target="_blank" class="text-muted hover:text-gray-300 text-sm px-3 py-1 rounded hover:bg-bg-lighter border border-border" title="API 调试工具">API</a>
    </div>
</header>

<!-- 记事本主体 -->
<div class="flex-1 flex flex-col overflow-hidden p-3">
    <textarea id="notepad"
        class="flex-1 w-full bg-bg-lighter border border-border rounded p-4 text-gray-200 text-sm font-mono resize-none focus:outline-none focus:border-accent-light leading-relaxed"
        readonly
        placeholder="暂无内容，点击编辑按钮开始..."
        spellcheck="false"></textarea>
</div>

<!-- 底部按钮栏 -->
<div class="bg-bg-light border-t border-border flex items-center justify-end h-10 px-3 shrink-0">
    <!-- 只读状态：显示编辑按钮 -->
    <div id="btns-view" class="flex items-center gap-2">
        <button id="btn-edit" class="bg-accent hover:bg-accent-light text-gray-200 text-sm px-4 py-1 rounded transition-colors">编辑</button>
    </div>
    <!-- 编辑状态：显示保存和取消按钮 -->
    <div id="btns-edit" class="flex items-center gap-2 hidden">
        <button id="btn-save" class="bg-green-700 hover:bg-green-600 text-gray-200 text-sm px-4 py-1 rounded transition-colors">保存</button>
        <button id="btn-cancel" class="bg-bg-lighter hover:bg-border text-gray-400 text-sm px-4 py-1 rounded border border-border transition-colors">取消</button>
    </div>
    <!-- 状态提示 -->
    <span id="status-msg" class="text-xs text-muted ml-3 hidden"></span>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    const notepad = document.getElementById('notepad');
    const btnsView = document.getElementById('btns-view');
    const btnsEdit = document.getElementById('btns-edit');
    const btnEdit = document.getElementById('btn-edit');
    const btnSave = document.getElementById('btn-save');
    const btnCancel = document.getElementById('btn-cancel');
    const statusMsg = document.getElementById('status-msg');

    let originalContent = '';

    // 加载内容
    async function loadContent() {
        try {
            const resp = await fetch('/api/secret');
            const data = await resp.json();
            notepad.value = data.content || '';
        } catch (e) {
            notepad.value = '';
        }
    }

    // 切换到编辑模式
    function enterEdit() {
        originalContent = notepad.value;
        notepad.removeAttribute('readonly');
        notepad.classList.remove('bg-bg-lighter');
        notepad.classList.add('bg-bg', 'ring-1', 'ring-accent-light');
        btnsView.classList.add('hidden');
        btnsEdit.classList.remove('hidden');
        notepad.focus();
    }

    // 退出编辑模式
    function exitEdit() {
        notepad.setAttribute('readonly', '');
        notepad.classList.add('bg-bg-lighter');
        notepad.classList.remove('bg-bg', 'ring-1', 'ring-accent-light');
        btnsEdit.classList.add('hidden');
        btnsView.classList.remove('hidden');
    }

    // 显示状态
    function showStatus(msg, duration) {
        statusMsg.textContent = msg;
        statusMsg.classList.remove('hidden');
        setTimeout(() => statusMsg.classList.add('hidden'), duration || 2000);
    }

    // 编辑按钮
    btnEdit.addEventListener('click', enterEdit);

    // 取消按钮
    btnCancel.addEventListener('click', function() {
        notepad.value = originalContent;
        exitEdit();
    });

    // 保存按钮
    btnSave.addEventListener('click', async function() {
        btnSave.disabled = true;
        btnSave.textContent = '保存中...';
        try {
            const resp = await fetch('/api/secret', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: notepad.value })
            });
            const data = await resp.json();
            if (data.ok) {
                exitEdit();
                showStatus('已保存', 2000);
            } else {
                showStatus('保存失败', 3000);
            }
        } catch (e) {
            showStatus('保存失败: ' + e.message, 3000);
        } finally {
            btnSave.disabled = false;
            btnSave.textContent = '保存';
        }
    });

    // 页面加载
    loadContent();
})();
</script>
{% endblock %}
